# Supabase CLI Configuration for AncestorTree Local Development

project_id = "ancestor-tree-local"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:4000"
additional_redirect_urls = ["http://localhost:4000"]

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = true
max_frequency = "1m"

[auth.rate_limit]
token_verifications = 30
token_refresh = 150

# SMTP disabled for local development
[auth.email.smtp]
enabled = false
host = "localhost"
port = 587
user = ""
pass = ""
admin_email = ""
sender_name = ""

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage]
enabled = true
file_size_limit = "10MB"

[storage.buckets.media]
public = true
file_size_limit = "10MB"
allowed_mime_types = [
"image/jpeg",
"image/png",
"image/webp",
"image/gif",
"application/pdf",
"application/msword",
"application/vnd.openxmlformats-officedocument.wordprocessingml.document",
"video/mp4",
"video/webm"
]